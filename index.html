<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<div class="filter-buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">
    <img src="https://picsum.photos/id/1015/400/300" class="nature">
    <img src="https://picsum.photos/id/1011/400/300" class="nature">
    <img src="https://picsum.photos/id/1012/400/300" class="city">
    <img src="https://picsum.photos/id/1016/400/300" class="city">
</div>

<div id="lightbox">
    <span id="close">&times;</span>
    <button id="prev">&#10094;</button>
    <img id="lightbox-img">
    <button id="next">&#10095;</button>
</div>

<script src="script.js"></script>

</body>
</html>
